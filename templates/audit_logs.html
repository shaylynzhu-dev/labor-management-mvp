<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>审计日志 · Labour OS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="app-shell detail-shell">
    <header class="detail-topbar"><div><a class="back-link" href="{{ url_for('index') }}">← 返回工作台</a><h1>审计日志</h1><p>最近500条登录及数据变更记录</p></div></header>
    <section class="panel detail-panel"><div class="table-wrap"><table><thead><tr><th>时间</th><th>用户</th><th>动作</th><th>资源</th><th>记录编号</th></tr></thead><tbody>
      {% for log in audit_logs %}<tr><td>{{ log.timestamp }}</td><td>{{ log.username or '匿名/系统' }}</td><td>{{ log.action }}</td><td>{{ log.entity_type }}</td><td>{{ log.entity_id or '—' }}</td></tr>{% else %}<tr><td colspan="5" class="empty">暂无审计记录。</td></tr>{% endfor %}
    </tbody></table></div></section>
  </main>
</body>
</html>
