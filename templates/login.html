<!doctype html>
<html lang="zh-CN">
<head>
  <script>if (location.protocol === 'file:') location.replace('http://127.0.0.1:5001/');</script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 · Labour OS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='operator.css') }}">
</head>
<body>
  <main class="login-shell">
    <section class="panel login-card">
      <div class="brand login-brand"><span>LO</span>Labour OS</div>
      <div class="panel-head"><div><h1>登录系统</h1><p>请输入账号和密码</p></div></div>
      {% if error %}<div class="flash error">{{ error }}</div>{% endif %}
      <form method="post" class="login-form">
        <label>用户名<input name="username" autocomplete="username" required autofocus></label>
        <label>密码<input type="password" name="password" autocomplete="current-password" required></label>
        <button class="button primary" type="submit">登录</button>
      </form>
    </section>
  </main>
</body>
</html>
